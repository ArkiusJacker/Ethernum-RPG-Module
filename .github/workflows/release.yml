name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version in module.json
        run: |
          jq --arg v "${{ steps.version.outputs.VERSION }}" '.version = $v' module.json > module.json.tmp
          mv module.json.tmp module.json

      - name: Build
        run: npm run build

      - name: Create release zip
        run: |
          cd dist
          zip -r ../ethernum-rpg-module.zip . \
            --exclude "*.DS_Store" \
            --exclude "*Thumbs.db"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ethernum-rpg-module.zip
            dist/module.json
          generate_release_notes: true
