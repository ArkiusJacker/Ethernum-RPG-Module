name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version in module.json
        run: |
          jq --arg v "${{ steps.version.outputs.VERSION }}" '.version = $v' module.json > module.json.tmp
          mv module.json.tmp module.json

      - name: Create release zip
        run: |
          zip -r ethernum-rpg-module.zip \
            module.json \
            scripts/ \
            styles/ \
            templates/ \
            lang/ \
            LICENSE \
            README.md \
            CHANGELOG.md \
            --exclude "*.DS_Store" \
            --exclude "*Thumbs.db"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ethernum-rpg-module.zip
            module.json
          generate_release_notes: true
